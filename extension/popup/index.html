<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVoice FR™</title>
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 18px;
            margin: 0;
            color: #1976d2;
        }
        .status {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding: 8px;
            background-color: #e3f2fd;
            border-radius: 4px;
        }
        .status-icon {
            margin-right: 8px;
        }
        .status-connected {
            color: #4caf50;
        }
        .status-disconnected {
            color: #f44336;
        }
        .button {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: none;
            border-radius: 4px;
            background-color: #1976d2;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #1565c0;
        }
        .button:disabled {
            background-color: #b0bec5;
            cursor: not-allowed;
        }
        .button-stop {
            background-color: #f44336;
        }
        .button-stop:hover {
            background-color: #d32f2f;
        }
        .settings-link {
            text-align: center;
            margin-top: 12px;
        }
        .settings-link a {
            color: #1976d2;
            text-decoration: none;
            font-size: 12px;
        }
        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>EduVoice FR™</h1>
    </div>
    
    <div class="status" id="status">
        <span class="status-icon" id="status-icon">⚠️</span>
        <span id="status-text">Non connecté</span>
    </div>
    
    <button class="button" id="connectButton">Connecter au backend</button>
    <button class="button" id="translateButton" disabled>Écouter en Français</button>
    <button class="button button-stop" id="stopButton" disabled>Arrêter</button>
    
    <div class="error-message" id="errorMessage"></div>
    
    <div class="settings-link">
        <a href="#" id="settingsLink">Paramètres</a>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
