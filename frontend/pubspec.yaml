name: eduvoice_fr
description: Traducteur vocal intelligent Anglais → Français pour l'apprentissage.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  
  # Audio
  audioplayers: ^5.0.0
  
  # WebSocket
  socket_io_client: ^2.0.0
  
  # Permissions (Android/iOS)
  permission_handler: ^11.1.0
  
  # Stockage local
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Markdown (pour les exports)
  flutter_markdown: ^0.6.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    
